<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>finance.codin.gg — Crypto Data Service</title>
  <style>
    :root {
      --bg-color: #E2E8E4;
      /* Sage Green */
      --text-color: #2B3331;
      /* Deep Charcoal */
      --accent-yellow: #F4D03F;
      /* Pastel Yellow */
      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", Monaco, Consolas, "Fira Code", monospace;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-main);
      margin: 0;
      padding: 40px 5vw;
      box-sizing: border-box;
    }

    /* --- HEADER NAVIGATION --- */
    header {
      border-bottom: 1px solid rgba(43, 51, 49, 0.1);
      padding-bottom: 25px;
      margin-bottom: 40px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* --- NEW LOGO STYLING --- */
    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.05em;
      position: relative;
      cursor: default;
    }

    .logo-prefix {
      opacity: 0.6;
      font-weight: 500;
    }

    .logo-gg {
      color: var(--accent-yellow);
      position: relative;
      display: inline-block;
      animation: text-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      animation-delay: 0.3s;
      opacity: 0;
      transform: scale(0);
    }

    /* Particle Burst Animation */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background-color: var(--accent-yellow);
      border-radius: 50%;
      opacity: 0;
      top: 50%;
      left: 50%;
    }

    .p1 {
      animation: burst1 1s ease-out 0.4s forwards;
    }

    .p2 {
      animation: burst2 1s ease-out 0.4s forwards;
    }

    .p3 {
      animation: burst3 1s ease-out 0.4s forwards;
    }

    .p4 {
      animation: burst4 1s ease-out 0.4s forwards;
    }

    @keyframes text-pop {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes burst1 {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(-30px, -30px) scale(0);
        opacity: 0;
      }
    }

    @keyframes burst2 {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(20px, -35px) scale(0);
        opacity: 0;
      }
    }

    @keyframes burst3 {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(-35px, 20px) scale(0);
        opacity: 0;
      }
    }

    @keyframes burst4 {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(30px, 25px) scale(0);
        opacity: 0;
      }
    }

    /* --- NAV LINKS --- */
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 25px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    nav a {
      color: var(--text-color);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 2px solid var(--accent-yellow);
    }

    /* --- SWAGGER WRAPPER (ELEGANT WHITE CARD) --- */
    #swagger-ui {
      background-color: #FFFFFF;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(43, 51, 49, 0.05);
      border: 1px solid rgba(43, 51, 49, 0.08);
      margin-top: 20px;
    }

    /* Subtle adjustments to Swagger UI colors to match our theme */
    .swagger-ui .info .title {
      color: var(--text-color) !important;
      font-family: var(--font-main) !important;
    }

    .swagger-ui .scheme-container {
      background: transparent !important;
      box-shadow: none !important;
      border-bottom: 1px solid rgba(43, 51, 49, 0.1);
      padding: 20px 0 !important;
    }

    @media (max-width: 600px) {
      body {
        padding: 30px 20px;
      }

      nav {
        flex-direction: column;
        align-items: flex-start;
      }

      nav ul {
        flex-direction: column;
        gap: 10px;
      }

      #swagger-ui {
        padding: 15px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui.css" />
</head>

<body>
  <header>
    <nav>
      <!-- Updated Logo with pulsing .gg and yellow styling -->
      <div class="logo">
        <span class="logo-prefix">finance.</span>codin<span class="logo-gg">.gg
          <div class="particle p1"></div>
          <div class="particle p2"></div>
          <div class="particle p3"></div>
          <div class="particle p4"></div>
        </span>
      </div>

      <ul>
        <li><a href="https://codin.gg">codin.gg</a></li>
        <li><a href="ipfs://codin.x">ipfs://codin.x</a></li>
        <li><a href="https://github.com/codin-gg" target="_blank">github ↗</a></li>
      </ul>
    </nav>
  </header>

  <!-- Housed inside our clean white card component -->
  <section id="swagger-ui"></section>

  <script crossorigin src="https://unpkg.com/swagger-ui-dist@4.5.0/swagger-ui-bundle.js"></script>
  <script>
    window.addEventListener('load', () => {
      window.ui = SwaggerUIBundle({
        url: 'api/openapi.yml',
        dom_id: '#swagger-ui'
      });
    });
  </script>
</body>

</html>
